<div *ngIf="{disabled: disabled$ | async} as obs">
  <v-input
    name="resultProcessVariableName"
    [title]="'resultProcessVariableName' | pluginTranslate: pluginId | async"
    [margin]="true"
    [disabled]="obs.disabled"
    [defaultValue]="resultProcessVariableName$ | async"
    [required]="true"
    [widthPx]="350"
    (valueChange)="onResultVariableChange($event)"
  ></v-input>

  <p class="v-label">{{ 'query' | pluginTranslate: pluginId | async }}</p>
  <valtimo-editor
    [model]="queryModel$ | async"
    [disabled]="obs.disabled"
    [heightPx]="250"
    [formatOnLoad]="false"
    (valueChangeEvent)="onQueryChange($event)"
  ></valtimo-editor>

  <p class="v-label" style="margin-top: 16px">{{ 'variables' | pluginTranslate: pluginId | async }}</p>
  <valtimo-editor
    [model]="variablesModel$ | async"
    [disabled]="obs.disabled"
    [heightPx]="150"
    [formatOnLoad]="true"
    (valueChangeEvent)="onVariablesChange($event)"
  ></valtimo-editor>
</div>
